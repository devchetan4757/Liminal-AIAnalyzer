<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00ff88"/>
      <stop offset="100%" stop-color="#020b08"/>
    </radialGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- outer AI ring -->
  <circle cx="50" cy="50" r="47" fill="url(#bg)"/>

  <!-- scanning ring -->
  <circle cx="50" cy="50" r="36"
        fill="none"
        stroke="#00ff88"
        stroke-width="2"
        opacity="0.8"
        filter="url(#glow)"/>

  <!-- inner core -->
  <circle cx="50" cy="50" r="18"
        fill="#06130f"
        stroke="#00ff88"
        stroke-width="2"
        filter="url(#glow)"/>

  <!-- AI neural nodes -->
  <circle cx="50" cy="50" r="3" fill="#00ff88"/>
  <circle cx="50" cy="36" r="2.5" fill="#00ff88"/>
  <circle cx="50" cy="64" r="2.5" fill="#00ff88"/>
  <circle cx="36" cy="50" r="2.5" fill="#00ff88"/>
  <circle cx="64" cy="50" r="2.5" fill="#00ff88"/>

  <!-- connection lines -->
  <line x1="50" y1="50" x2="50" y2="36" stroke="#00ff88" stroke-width="1.5" opacity="0.7"/>
  <line x1="50" y1="50" x2="50" y2="64" stroke="#00ff88" stroke-width="1.5" opacity="0.7"/>
  <line x1="50" y1="50" x2="36" y2="50" stroke="#00ff88" stroke-width="1.5" opacity="0.7"/>
  <line x1="50" y1="50" x2="64" y2="50" stroke="#00ff88" stroke-width="1.5" opacity="0.7"/>
</svg>
